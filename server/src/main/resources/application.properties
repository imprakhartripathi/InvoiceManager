spring.application.name=server
server.port=${PORT:8080}
server.address=0.0.0.0

# MongoDB (set MONGODB_URI for Atlas; falls back to local)
# Spring Boot 4 style key
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/invoicemanager}
# Backward-compatible key
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/invoicemanager}

# JWT
app.jwt.secret=${JWT_SECRET:change-this-to-a-strong-secret-key-at-least-32-bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# app-level crypto for stored SMTP app password
app.crypto.secret=${APP_CRYPTO_SECRET:change-this-too}

# Mail (Gmail defaults, override via env vars if needed)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# SendGrid (default delivery path when SENDGRID_API_KEY is set)
app.sendgrid.api-key=${SENDGRID_API_KEY:}
app.sendgrid.from-email=${SENDGRID_FROM_EMAIL:${MAIL_USERNAME:no-reply@invoicemanager.local}}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

# Razorpay
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
