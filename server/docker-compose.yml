services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoicemanager-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/invoicemanager}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-strong-secret-key-at-least-32-bytes}
      APP_CRYPTO_SECRET: ${APP_CRYPTO_SECRET:-change-this-too}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
    restart: unless-stopped
