<mat-sidenav-container class="shell">
  <mat-sidenav
    class="sidebar"
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    #drawer
  >
    <div class="brand">
      <div class="brand-mark">IM</div>
      <div>
        <h2>InvoiceManager</h2>
        <p>Billing Workspace</p>
      </div>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list>
      <a mat-list-item *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <div class="sidebar-footer">
      <p class="user-mail">{{ userEmail }}</p>
      <button mat-stroked-button color="primary" type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <mat-toolbar class="topbar">
      <button mat-icon-button type="button" *ngIf="isMobile()" (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <div>
        <p class="eyebrow">Invoice & Billing</p>
        <h1>{{ pageTitle() }}</h1>
      </div>
      <span class="spacer"></span>
      <button mat-flat-button color="primary" routerLink="/invoices/new">
        <mat-icon>add</mat-icon>
        New Invoice
      </button>
    </mat-toolbar>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
