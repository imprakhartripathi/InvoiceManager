<section class="page">
  <header>
    <p class="eyebrow">Settings</p>
    <h2>SMTP Configuration</h2>
    <p class="muted">Configure default email delivery for invoices and reminders.</p>
  </header>

  <mat-card class="settings-card">
    <mat-progress-bar mode="indeterminate" *ngIf="loading"></mat-progress-bar>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-checkbox formControlName="enabled">Enable custom SMTP</mat-checkbox>

      <div *ngIf="form.controls.enabled.value">
        <div class="grid-2">
          <mat-form-field appearance="outline">
            <mat-label>SMTP Host</mat-label>
            <input matInput formControlName="host" placeholder="smtp.gmail.com" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>SMTP Port</mat-label>
            <input matInput type="number" formControlName="port" placeholder="587" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Sender Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="billing@yourdomain.com" />
          <mat-error *ngIf="submitted && form.controls.email.invalid">Enter a valid email address.</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>App Password</mat-label>
          <input matInput type="password" formControlName="appPassword" placeholder="Paste app password" />
          <mat-hint>This value is encrypted server-side.</mat-hint>
        </mat-form-field>
      </div>

      <div class="actions">
        <button mat-stroked-button type="button" (click)="load()">Reload</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save Settings' }}
        </button>
      </div>

      <p class="ok" *ngIf="success">{{ success }}</p>
      <p class="error" *ngIf="error">{{ error }}</p>
    </form>
  </mat-card>
</section>
