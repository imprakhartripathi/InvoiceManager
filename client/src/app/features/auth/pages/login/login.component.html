<section class="auth-page">
  <mat-card class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to manage templates, invoices, and payments.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
        <mat-error *ngIf="submitted && form.controls.email.invalid">Please enter a valid email.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />
        <mat-error *ngIf="submitted && form.controls.password.invalid">Password is required.</mat-error>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="error" *ngIf="error">{{ error }}</p>
    <p class="switch">New here? <a routerLink="/auth/signup">Create an account</a></p>
  </mat-card>
</section>
