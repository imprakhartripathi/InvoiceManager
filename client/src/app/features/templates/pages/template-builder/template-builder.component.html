<section class="page">
  <header>
    <p class="eyebrow">Templates</p>
    <h2>{{ isEditMode ? 'Edit Template' : 'Template Builder' }}</h2>
    <p class="muted">Create dynamic field definitions for invoice generation.</p>
  </header>

  <mat-card class="builder-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="layout-grid">
        <mat-form-field appearance="outline">
          <mat-label>Template Name</mat-label>
          <input matInput formControlName="name" placeholder="e.g. Consulting Invoice" />
          <mat-error *ngIf="submitted && form.controls.name.invalid">Template name is required.</mat-error>
        </mat-form-field>

        <mat-checkbox formControlName="hasLineItems">Enable line items</mat-checkbox>
      </div>

      <mat-divider></mat-divider>

      <div class="section-head">
        <h3>Custom Fields</h3>
        <button mat-stroked-button type="button" (click)="addField()">Add Field</button>
      </div>

      <div formArrayName="fields" class="field-grid">
        <mat-card class="field-row" *ngFor="let field of fields.controls; let i = index" [formGroupName]="i">
          <div class="row-head">
            <h4>Field {{ i + 1 }}</h4>
            <button mat-icon-button type="button" (click)="removeField(i)" [disabled]="fields.length === 1">
              <mat-icon>delete</mat-icon>
            </button>
          </div>

          <div class="row-grid">
            <mat-form-field appearance="outline">
              <mat-label>Key</mat-label>
              <input matInput formControlName="key" placeholder="customerName" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Label</mat-label>
              <input matInput formControlName="label" placeholder="Customer Name" />
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Type</mat-label>
              <mat-select formControlName="type">
                <mat-option value="text">Text</mat-option>
                <mat-option value="number">Number</mat-option>
                <mat-option value="date">Date</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Default Value</mat-label>
              <input matInput formControlName="defaultValue" />
            </mat-form-field>
          </div>

          <mat-checkbox formControlName="required">Required</mat-checkbox>
        </mat-card>
      </div>

      <div class="actions">
        <button mat-stroked-button type="button" routerLink="/templates">Cancel</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : (isEditMode ? 'Update Template' : 'Save Template') }}
        </button>
      </div>

      <p class="error" *ngIf="error">{{ error }}</p>
    </form>
  </mat-card>
</section>
