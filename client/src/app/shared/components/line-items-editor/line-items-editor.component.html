<div class="line-items">
  <mat-card class="row" *ngFor="let row of lineItems.controls; let i = index" [formGroup]="row">
    <div class="row-header">
      <h4>Item {{ i + 1 }}</h4>
      <button mat-icon-button type="button" (click)="removeLineItem(i)">
        <mat-icon>delete</mat-icon>
      </button>
    </div>

    <div class="row-grid">
      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <input matInput formControlName="description" placeholder="Service or product" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Quantity</mat-label>
        <input matInput type="number" min="0" formControlName="quantity" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Unit Price</mat-label>
        <input matInput type="number" min="0" formControlName="unitPrice" />
      </mat-form-field>
    </div>
  </mat-card>
</div>
